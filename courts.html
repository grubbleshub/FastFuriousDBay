<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Court Allocation · DBay Drift 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--gold:#F5C842;--neon-green:#39FF6A;--neon-pink:#FF3CAC;--red:#FF4545;--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.28);--text:#f0f0f0;--text-muted:#B0B0C0;--text-dim:#8A8A9A;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999;}

  .site-header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,69,69,0.25);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:var(--gold);line-height:1;}
  .logo-sub{font-size:13px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;text-transform:uppercase;}
  .page-badge{background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.3);color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:3px 10px;border-radius:2px;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  #conn-status{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:2px;border:1px solid transparent;transition:all 0.3s;}
  #conn-status.online{color:var(--neon-green);border-color:rgba(57,255,106,0.3);}
  #conn-status.offline{color:var(--red);border-color:rgba(255,69,69,0.3);}
  .nav-link{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:3px;transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
  .nav-link:hover{color:var(--neon-green);border-color:var(--neon-green);}

  .container{max-width:1200px;margin:0 auto;padding:24px 20px 60px;}
  .section-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#8A8A9A;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* PAGE TITLE */
  .page-title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:0.04em;color:var(--gold);line-height:1;}
  .page-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--text-muted);letter-spacing:0.05em;}

  /* COURT OVERVIEW STRIP */
  .courts-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:32px;}
  .court-chip{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 8px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
  .court-chip.active{border-color:var(--gold);background:rgba(245,200,66,0.07);}
  .court-chip:hover:not(.active){border-color:var(--border-bright);}
  .court-chip-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.04em;color:var(--gold);line-height:1;}
  .court-chip-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-top:2px;}
  .court-chip-count{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text-muted);margin-top:4px;}

  /* LAYOUT: two-column — match list left, courts right */
  .alloc-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
  @media(max-width:860px){.alloc-layout{grid-template-columns:1fr;}}

  /* MATCH LIST */
  .match-list{display:flex;flex-direction:column;gap:8px;}
  .match-row{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
  .match-row:hover{border-color:var(--border-bright);}
  .match-row.selected{border-color:var(--gold);background:rgba(245,200,66,0.05);}
  .match-row.allocated{border-color:rgba(57,255,106,0.3);}
  .match-row.played{opacity:0.55;}
  .match-row-left{}
  .match-cat{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px;}
  .match-teams{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.3;}
  .match-teams .vs{color:var(--text-dim);font-weight:400;font-size:13px;margin:0 4px;}
  .match-type-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text-dim);letter-spacing:0.06em;margin-top:3px;}
  .match-row-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .court-pill{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#111;background:var(--gold);padding:2px 10px;border-radius:3px;min-width:52px;text-align:center;}
  .court-pill.unset{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border-bright);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;padding:4px 10px;}
  .played-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;background:rgba(57,255,106,0.15);color:var(--neon-green);border:1px solid rgba(57,255,106,0.3);padding:2px 8px;border-radius:2px;}

  /* FILTER BAR */
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
  .filter-btn.active{background:rgba(255,255,255,0.08);color:var(--text);border-color:var(--border-bright);}
  .filter-btn:hover:not(.active){border-color:var(--border-bright);color:var(--text-muted);}

  /* COURT ASSIGNMENT PANEL */
  .assign-panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:20px;position:sticky;top:80px;}
  .assign-panel-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);margin-bottom:4px;}
  .assign-panel-match{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--text-muted);line-height:1.4;margin-bottom:16px;min-height:44px;}
  .assign-panel-match strong{color:var(--text);display:block;}
  .court-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
  .court-btn{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.04em;padding:12px 0;border-radius:3px;border:1px solid var(--border-bright);background:var(--bg3);color:var(--text-muted);cursor:pointer;transition:all 0.15s;text-align:center;}
  .court-btn:hover{background:rgba(245,200,66,0.1);border-color:var(--gold);color:var(--gold);}
  .court-btn.assigned{background:rgba(245,200,66,0.15);border-color:var(--gold);color:var(--gold);}
  .court-btn.busy{border-color:rgba(255,69,69,0.3);color:rgba(255,69,69,0.6);}
  .court-btn.busy:hover{background:rgba(255,69,69,0.08);border-color:var(--red);color:var(--red);}
  .btn-clear-court{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:8px;border-radius:3px;border:1px solid rgba(255,69,69,0.2);background:transparent;color:rgba(255,69,69,0.6);cursor:pointer;transition:all 0.15s;}
  .btn-clear-court:hover{color:var(--red);border-color:var(--red);background:rgba(255,69,69,0.05);}
  .assign-hint{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--text-dim);letter-spacing:0.05em;text-align:center;padding:20px 0;}

  /* BUSY INDICATOR */
  .busy-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:4px;vertical-align:middle;}

  /* STATS ROW */
  .stats-row{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
  .stat-chip{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 16px;display:flex;flex-direction:column;gap:2px;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1;}
  .stat-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;}

  /* CLEAR ALL */
  .btn-clear-all{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:7px 16px;border-radius:3px;border:1px solid rgba(255,69,69,0.2);background:transparent;color:rgba(255,69,69,0.5);cursor:pointer;transition:all 0.15s;}
  .btn-clear-all:hover{color:var(--red);border-color:var(--red);background:rgba(255,69,69,0.05);}

  .loading{display:flex;align-items:center;justify-content:center;padding:80px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);gap:10px;}
  .spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border-bright);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:0.08em;padding:10px 20px;border-radius:4px;transition:transform 0.3s ease;z-index:1000;white-space:nowrap;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  @media(max-width:600px){.courts-strip{grid-template-columns:repeat(4,1fr);}.court-buttons{grid-template-columns:repeat(4,1fr);}.container{padding:16px 12px 40px;}}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="logo-text">DBay Drift</div>
    <div class="logo-sub">Pickleball 2026</div>
  </div>
  <div class="page-badge">🏟 Courts</div>
  <div class="header-right">
    <span id="conn-status" class="offline">Connecting…</span>
    <a href="admin.html" class="nav-link">← Admin</a>
    <a href="players.html" class="nav-link">Player View</a>
  </div>
</header>

<div id="root"><div class="loading"><div class="spin"></div> Loading…</div></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0gzqqJww11khc0xcq5dguzbFZ7B12VR8",
  authDomain: "fastfurious-dbaydrift.firebaseapp.com",
  databaseURL: "https://fastfurious-dbaydrift-default-rtdb.firebaseio.com",
  projectId: "fastfurious-dbaydrift",
  storageBucket: "fastfurious-dbaydrift.firebasestorage.app",
  messagingSenderId: "488263250252",
  appId: "1:488263250252:web:f661c24a591d85b4505fe9"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const NUM_COURTS = 8;

const CATEGORIES = [
  { id:'mens-35-below',   name:"Men's 3.5 & Below",   type:"MEN",    accent:'#3CEFFF' },
  { id:'mens-35-plus',    name:"Men's 3.5+",           type:"MEN",    accent:'#3CEFFF' },
  { id:'womens-35-below', name:"Women's 3.5 & Below",  type:"WOMEN",  accent:'#FF3CAC' },
  { id:'womens-35-plus',  name:"Women's 3.5+",         type:"WOMEN",  accent:'#FF3CAC' },
  { id:'mixed-35-below',  name:"Mixed 3.5 & Below",    type:"MIXED",  accent:'#39FF6A' },
  { id:'mixed-35-plus',   name:"Mixed 3.5+",           type:"MIXED",  accent:'#39FF6A' },
  { id:'all-beginners',   name:"All-In Beginners",      type:"ALL-IN", accent:'#F5C842' },
  { id:'all-advanced',    name:"All-In Advanced",       type:"ALL-IN", accent:'#F5C842' },
  { id:'seniors-50plus',  name:"50+ Seniors",           type:"50+",    accent:'#C084FC' },
  { id:'juniors',         name:"Junior Scramble",       type:"JUNIOR", accent:'#FB923C' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  catData: {},
  courts: {},       // courtKey → courtNumber
  selected: null,   // currently selected match key
  filter: 'all',    // 'all' | 'unallocated' | 'pool' | 'finals'
  loading: true,
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fixCatData(d) {
  if (!d) return null;
  if (d.pools && !Array.isArray(d.pools)) d.pools = Object.values(d.pools);
  if (d.pools) d.pools = d.pools.map(pool => {
    if (pool.matches && !Array.isArray(pool.matches)) pool.matches = Object.values(pool.matches);
    if (pool.teamNames && !Array.isArray(pool.teamNames)) pool.teamNames = Object.values(pool.teamNames);
    return pool;
  });
  return d;
}

function matchResult(m) {
  if (!m || m.sA === '' || m.sB === '' || m.sA === null || m.sB === null) return null;
  const sA = parseInt(m.sA), sB = parseInt(m.sB);
  return isNaN(sA) || isNaN(sB) ? null : { sA, sB };
}

// Flatten all matches across all categories into a list
function allMatches() {
  const list = [];
  for (const cat of CATEGORIES) {
    const d = state.catData[cat.id];
    if (!d || !d.pools) continue;
    const poolLetters = ['A','B','C','D'];
    d.pools.forEach((pool, pi) => {
      (pool.matches || []).forEach(m => {
        list.push({
          key: `${cat.id}__${m.id}`,
          catId: cat.id,
          catName: cat.name,
          accent: cat.accent,
          matchId: m.id,
          type: 'pool',
          typeLabel: `Pool ${poolLetters[pi]}`,
          a: m.a, b: m.b,
          played: !!matchResult(m),
        });
      });
    });
    // Finals
    if (d.finals) {
      ['sf1','sf2','final'].forEach(fid => {
        const m = d.finals[fid];
        if (!m) return;
        list.push({
          key: `${cat.id}__${fid}`,
          catId: cat.id,
          catName: cat.name,
          accent: cat.accent,
          matchId: fid,
          type: 'final',
          typeLabel: m.label || fid,
          a: m.a, b: m.b,
          played: !!matchResult(m),
        });
      });
    }
  }
  return list;
}

function courtMatchCount(courtNum) {
  return Object.values(state.courts).filter(v => v === courtNum).length;
}

// Which court number is currently using this key?
function matchCourt(key) {
  return state.courts[key] || null;
}

// Which court numbers are in use right now (have ≥1 match assigned)?
function busyCourts() {
  const used = new Set();
  // A court is "busy" if it has an unplayed match assigned — warn but still allow
  const matches = allMatches();
  Object.entries(state.courts).forEach(([key, courtNum]) => {
    const m = matches.find(m => m.key === key);
    if (m && !m.played) used.add(courtNum);
  });
  return used;
}

// ── FIREBASE ──────────────────────────────────────────────────────────────────
async function assignCourt(matchKey, courtNum) {
  await set(ref(db, `courts/${matchKey}`), courtNum);
  state.courts[matchKey] = courtNum;
  toast(`Court ${courtNum} assigned ✓`);
  render();
}

async function clearCourt(matchKey) {
  await remove(ref(db, `courts/${matchKey}`));
  delete state.courts[matchKey];
  toast('Court cleared');
  render();
}

async function clearAll() {
  if (!confirm('Clear all court assignments? This cannot be undone.')) return;
  await set(ref(db, 'courts'), null);
  state.courts = {};
  toast('All courts cleared');
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  onValue(ref(db, '.info/connected'), snap => {
    const el = document.getElementById('conn-status');
    if (el) { el.textContent = snap.val() ? 'Online' : 'Offline'; el.className = snap.val() ? 'online' : 'offline'; }
  });

  const [catsSnap, courtsSnap] = await Promise.all([
    get(ref(db, 'cats')),
    get(ref(db, 'courts')),
  ]);

  if (catsSnap.exists()) {
    const data = catsSnap.val();
    for (const cat of CATEGORIES) state.catData[cat.id] = fixCatData(data[cat.id]);
  }
  state.courts = courtsSnap.exists() ? courtsSnap.val() : {};

  // Live listeners
  onValue(ref(db, 'cats'), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    for (const cat of CATEGORIES) { if (data[cat.id]) state.catData[cat.id] = fixCatData(data[cat.id]); }
    if (!state.loading) render();
  });
  onValue(ref(db, 'courts'), snap => {
    state.courts = snap.exists() ? snap.val() : {};
    if (!state.loading) render();
  });

  state.loading = false;
  render();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  if (state.loading) return;
  document.getElementById('root').innerHTML = renderPage();
  attach();
}

function renderPage() {
  const matches = allMatches();
  const total = matches.length;
  const allocated = matches.filter(m => matchCourt(m.key)).length;
  const played = matches.filter(m => m.played).length;
  const busy = busyCourts();

  // Filter
  const visible = matches.filter(m => {
    if (state.filter === 'unallocated') return !matchCourt(m.key) && !m.played;
    if (state.filter === 'pool') return m.type === 'pool';
    if (state.filter === 'finals') return m.type === 'final';
    return true;
  });

  // Selected match info
  const selMatch = state.selected ? matches.find(m => m.key === state.selected) : null;
  const selCourt = state.selected ? matchCourt(state.selected) : null;

  // Courts strip — count active (unplayed) allocations per court
  const courtsStrip = Array.from({length: NUM_COURTS}, (_, i) => {
    const n = i + 1;
    const count = Object.entries(state.courts).filter(([key, cn]) => {
      if (cn !== n) return false;
      const m = matches.find(m => m.key === key);
      return m && !m.played;
    }).length;
    return `
      <div class="court-chip ${state.selected && selCourt === n ? 'active' : ''}" data-court-chip="${n}">
        <div class="court-chip-num">${n}</div>
        <div class="court-chip-label">Court</div>
        <div class="court-chip-count">${count > 0 ? `${count} match${count>1?'es':''}` : '—'}</div>
      </div>`;
  }).join('');

  // Match list
  const matchRows = visible.map(m => {
    const court = matchCourt(m.key);
    const isSelected = state.selected === m.key;
    const teamA = m.a || 'TBD';
    const teamB = m.b || 'TBD';
    return `
      <div class="match-row ${isSelected?'selected':''} ${court&&!m.played?'allocated':''} ${m.played?'played':''}"
           data-matchkey="${m.key}">
        <div class="match-row-left">
          <div class="match-cat" style="color:${m.accent}">${m.catName} · ${m.typeLabel}</div>
          <div class="match-teams">${teamA}<span class="vs">vs</span>${teamB}</div>
          ${m.played ? '' : `<div class="match-type-tag">${m.type === 'final' ? '🏆 Finals match' : 'Pool play'}</div>`}
        </div>
        <div class="match-row-right">
          ${m.played
            ? '<span class="played-tag">Played</span>'
            : court
              ? `<div class="court-pill">Court ${court}</div>`
              : '<div class="court-pill unset">No court</div>'
          }
        </div>
      </div>`;
  }).join('');

  // Assignment panel
  const assignPanel = `
    <div class="assign-panel">
      <div class="assign-panel-title">Assign Court</div>
      ${selMatch
        ? `<div class="assign-panel-match">
            <strong>${selMatch.catName} · ${selMatch.typeLabel}</strong>
            ${selMatch.a || 'TBD'} vs ${selMatch.b || 'TBD'}
            ${selCourt ? `<span style="display:inline-block;margin-top:6px;font-family:'Bebas Neue';font-size:18px;color:var(--gold);">→ Court ${selCourt}</span>` : ''}
          </div>
          <div class="court-buttons">
            ${Array.from({length: NUM_COURTS}, (_, i) => {
              const n = i + 1;
              const isAssigned = selCourt === n;
              const isBusy = busy.has(n) && !isAssigned;
              return `<button class="court-btn ${isAssigned?'assigned':''} ${isBusy?'busy':''}"
                data-assign="${n}" title="${isBusy?'Court has unplayed matches':''}">
                ${isBusy?`<span class="busy-dot"></span>`:''}${n}
              </button>`;
            }).join('')}
          </div>
          <button class="btn-clear-court" id="btn-clear-court" ${!selCourt?'disabled style="opacity:0.4;cursor:default"':''}>
            Clear Court Assignment
          </button>`
        : `<div class="assign-hint">Select a match from the list to assign it to a court.</div>`
      }
    </div>`;

  return `
    <div class="container">
      <div class="page-title-row">
        <div>
          <div class="page-title">Court Allocation</div>
          <div class="page-subtitle">Saturday 16 May · Moreton City Pickleball · ${NUM_COURTS} courts</div>
        </div>
        <button class="btn-clear-all" id="btn-clear-all">✕ Clear All Allocations</button>
      </div>

      <div class="stats-row">
        <div class="stat-chip"><div class="stat-num">${total}</div><div class="stat-label">Total Matches</div></div>
        <div class="stat-chip"><div class="stat-num">${allocated}</div><div class="stat-label">Allocated</div></div>
        <div class="stat-chip"><div class="stat-num">${total-allocated-played}</div><div class="stat-label">Unallocated</div></div>
        <div class="stat-chip"><div class="stat-num">${played}</div><div class="stat-label">Played</div></div>
      </div>

      <div class="section-label">Courts Overview</div>
      <div class="courts-strip">${courtsStrip}</div>

      <div class="alloc-layout">
        <div>
          <div class="filter-bar">
            <button class="filter-btn ${state.filter==='all'?'active':''}" data-filter="all">All matches</button>
            <button class="filter-btn ${state.filter==='unallocated'?'active':''}" data-filter="unallocated">Unallocated</button>
            <button class="filter-btn ${state.filter==='pool'?'active':''}" data-filter="pool">Pool play</button>
            <button class="filter-btn ${state.filter==='finals'?'active':''}" data-filter="finals">Finals</button>
          </div>
          <div class="match-list">
            ${matchRows || `<div style="padding:32px;text-align:center;font-family:'Barlow Condensed';color:var(--text-dim);letter-spacing:0.1em;">No matches to show</div>`}
          </div>
        </div>
        ${assignPanel}
      </div>
    </div>`;
}

// ── ATTACH ────────────────────────────────────────────────────────────────────
function attach() {
  // Match row select
  document.querySelectorAll('[data-matchkey]').forEach(el => {
    el.addEventListener('click', () => {
      state.selected = state.selected === el.dataset.matchkey ? null : el.dataset.matchkey;
      render();
    });
  });

  // Court chip click — filter list to that court
  document.querySelectorAll('[data-court-chip]').forEach(el => {
    el.addEventListener('click', () => {
      // no-op for now, chips are informational
    });
  });

  // Filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => { state.filter = btn.dataset.filter; render(); });
  });

  // Court assign buttons
  document.querySelectorAll('[data-assign]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!state.selected) return;
      const courtNum = parseInt(btn.dataset.assign);
      const current = matchCourt(state.selected);
      if (current === courtNum) {
        // clicking same court clears it
        await clearCourt(state.selected);
      } else {
        await assignCourt(state.selected, courtNum);
      }
    });
  });

  // Clear court button
  const clearBtn = document.getElementById('btn-clear-court');
  if (clearBtn) clearBtn.addEventListener('click', async () => {
    if (state.selected) await clearCourt(state.selected);
  });

  // Clear all
  const clearAllBtn = document.getElementById('btn-clear-all');
  if (clearAllBtn) clearAllBtn.addEventListener('click', clearAll);
}

init();
</script>
</body>
</html>
