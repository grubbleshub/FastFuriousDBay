<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · DBay Drift Pickleball 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--gold:#F5C842;--neon-green:#39FF6A;--neon-pink:#FF3CAC;--red:#FF4545;--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.28);--text:#f0f0f0;--text-muted:#B0B0C0;--text-dim:#8A8A9A;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999;}

  .site-header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,69,69,0.25);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.05em;color:var(--gold);line-height:1;}
  .logo-sub{font-size:17px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;text-transform:uppercase;}
  .admin-badge{background:rgba(255,69,69,0.15);border:1px solid rgba(255,69,69,0.4);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:3px 10px;border-radius:2px;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  #conn-status{font-family:'Barlow Condensed',sans-serif;font-size:17px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:2px;border:1px solid transparent;transition:all 0.3s;}
  #conn-status.online{color:var(--neon-green);border-color:rgba(57,255,106,0.3);}
  #conn-status.offline{color:var(--red);border-color:rgba(255,69,69,0.3);}
  .player-link{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:3px;transition:color 0.15s,border-color 0.15s;}
  .player-link:hover{color:var(--neon-green);border-color:var(--neon-green);}

  .hero{position:relative;padding:36px 24px 28px;text-align:center;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(255,69,69,0.05) 0%,transparent 70%);pointer-events:none;}
  .event-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);border:1px solid rgba(255,69,69,0.3);padding:4px 14px;border-radius:2px;margin-bottom:12px;}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,72px);letter-spacing:0.04em;line-height:0.95;color:var(--gold);text-shadow:0 0 40px rgba(245,200,66,0.25);margin-bottom:4px;}
  .hero-sub{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,2.5vw,24px);letter-spacing:0.15em;color:#C0C0D0;margin-bottom:16px;}
  .hero-meta{font-family:'Barlow Condensed',sans-serif;font-size:17px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);}
  .hero-meta span{color:var(--neon-green);}

  .container{max-width:1100px;margin:0 auto;padding:0 20px 60px;}
  .section-label{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#8A8A9A;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* CAT GRID */
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:40px;}
  .cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:18px 16px;cursor:pointer;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;position:relative;overflow:hidden;}
  .cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
  .cat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
  .cat-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .cat-pill{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:2px 8px;border-radius:2px;color:var(--accent);background:rgba(255,255,255,0.05);border:1px solid var(--accent);}
  .cat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(255,255,255,0.06);}
  .cat-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:4px;}
  .cat-desc{font-size:16px;color:var(--text-muted);}
  .cat-team-count{font-family:'Barlow Condensed',sans-serif;font-size:17px;color:var(--text-dim);margin-top:6px;}
  .cat-team-count.has-teams{color:var(--gold);}
  .cat-status{margin-top:6px;display:flex;align-items:center;gap:6px;font-size:17px;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;}
  .status-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);}
  .status-dot.active{background:var(--neon-green);box-shadow:0 0 6px var(--neon-green);}

  /* IMPORT PANEL */
  .import-panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:22px 24px;margin-bottom:32px;position:relative;overflow:hidden;}
  .import-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),rgba(245,200,66,0.1));}
  .import-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);margin-bottom:4px;}
  .import-desc{font-size:16px;color:var(--text-muted);line-height:1.6;margin-bottom:16px;}
  .import-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn-import{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:9px 18px;border-radius:3px;cursor:pointer;transition:all 0.15s;border:none;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn-import.primary{background:var(--gold);color:#111;}
  .btn-import.primary:hover{background:#e8bb18;}
  .btn-import.primary:disabled{background:rgba(245,200,66,0.25);color:rgba(0,0,0,0.3);cursor:not-allowed;}
  .btn-import.secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border-bright);}
  .btn-import.secondary:hover{color:var(--text);border-color:rgba(255,255,255,0.35);}
  .btn-import.secondary:disabled{opacity:0.3;cursor:not-allowed;}
  .btn-import.danger-soft{background:transparent;color:rgba(255,69,69,0.55);border:1px solid rgba(255,69,69,0.18);}
  .btn-import.danger-soft:hover{color:var(--red);border-color:var(--red);background:rgba(255,69,69,0.05);}
  .btn-import.danger-soft:disabled{opacity:0.3;cursor:not-allowed;}
  .import-status{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:0.06em;margin-top:14px;padding:9px 13px;border-radius:3px;display:none;line-height:1.5;}
  .import-status.success{display:block;background:rgba(57,255,106,0.07);border:1px solid rgba(57,255,106,0.2);color:var(--neon-green);}
  .import-status.error{display:block;background:rgba(255,69,69,0.07);border:1px solid rgba(255,69,69,0.2);color:#ff8080;}
  .import-status.loading{display:flex;align-items:center;gap:9px;background:rgba(245,200,66,0.05);border:1px solid rgba(245,200,66,0.15);color:var(--gold);}
  .spin-sm{width:13px;height:13px;border:2px solid rgba(245,200,66,0.25);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}

  /* BACK */
  .back-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:17px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:0;margin-bottom:24px;transition:color 0.15s;}
  .back-btn:hover{color:var(--gold);}

  /* BRACKET HEADER */
  .bracket-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .bracket-accent{width:4px;border-radius:2px;align-self:stretch;min-height:46px;}
  .bracket-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:0.04em;color:var(--text);line-height:1;margin-bottom:4px;}
  .bracket-meta-row{display:flex;gap:12px;flex-wrap:wrap;font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);}

  /* POOL SECTION */
  .pool-section{margin-bottom:32px;}
  .pool-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .pool-label{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.05em;}
  .pool-badge{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:3px 9px;border-radius:2px;background:rgba(255,255,255,0.06);color:#B0B0C0;border:1px solid rgba(255,255,255,0.2);}

  /* MATCH CARDS */
  .matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px;}
  .match-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border-color 0.2s;}
  .match-card.has-scores{border-color:rgba(255,255,255,0.12);}
  .match-card.finals-card{border-color:rgba(245,200,66,0.2);}
  .match-meta{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);}
  .done-tag{background:rgba(57,255,106,0.18);color:var(--neon-green);font-size:16px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:2px 6px;border-radius:2px;}
  .match-team{display:flex;align-items:center;justify-content:space-between;padding:9px 10px 9px 12px;border-bottom:1px solid var(--border);gap:8px;}
  .match-team:last-of-type{border-bottom:none;}
  .team-name-cell{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:500;color:var(--text-muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .team-name-cell.winner{color:var(--text);font-weight:600;}
  .team-name-cell.tbd{color:var(--text-dim);font-style:italic;font-size:17px;}
  .score-num{font-family:'Bebas Neue',sans-serif;font-size:24px;min-width:26px;text-align:center;color:var(--text-dim);}
  .score-num.win{color:var(--neon-green);}
  .score-num.lose{color:#6A6A7A;}
  .score-input{width:44px;height:28px;background:rgba(255,255,255,0.05);border:1px solid var(--border-bright);border-radius:3px;color:var(--text);text-align:center;font-family:'Bebas Neue',sans-serif;font-size:16px;outline:none;transition:border-color 0.15s,background 0.15s;}
  .score-input:focus{border-color:var(--accent-local,var(--gold));background:rgba(255,255,255,0.08);}
  .winner-bar{height:2px;transform-origin:left;transform:scaleX(0);transition:transform 0.4s ease;}
  .winner-bar.show{transform:scaleX(1);}

  /* STANDINGS TABLE */
  .standings{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px;}
  .standings-head{display:grid;grid-template-columns:28px 1fr 36px 36px 36px 44px 52px;padding:7px 12px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
  .sh{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);text-align:center;}
  .sh:nth-child(2){text-align:left;}
  .standings-row{display:grid;grid-template-columns:28px 1fr 36px 36px 36px 44px 52px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:center;}
  .standings-row:last-child{border-bottom:none;}
  .standings-row.advances{background:rgba(57,255,106,0.04);}
  .sr-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#8A8A9A;text-align:center;}
  .sr-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sr-name.tbd{color:var(--text-dim);font-style:italic;font-size:17px;}
  .sr-cell{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--text-muted);text-align:center;}
  .sr-pts{font-family:'Bebas Neue',sans-serif;font-size:19px;text-align:center;color:#8A8A9A;}
  .sr-pts.has-pts{color:var(--neon-green);}
  .advances-tag{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--neon-green);background:rgba(57,255,106,0.18);border:1px solid rgba(57,255,106,0.4);padding:1px 5px;border-radius:2px;margin-left:6px;white-space:nowrap;}

  /* TEAM EDITOR */
  .team-editor-panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:20px 24px;margin-bottom:24px;}
  .team-editor-panel::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--border-bright),transparent);margin:-20px -24px 16px;}
  .team-count-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;row-gap:10px;}
  .count-group{display:flex;align-items:center;gap:8px;}
  .count-divider{width:1px;height:28px;background:var(--border-bright);margin:0 4px;}
  .team-count-label{font-family:'Barlow Condensed',sans-serif;font-size:17px;color:var(--text-muted);letter-spacing:0.05em;}
  .team-count-input{width:64px;background:var(--bg3);border:1px solid var(--border-bright);border-radius:3px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:18px;padding:5px 10px;text-align:center;outline:none;}
  .team-count-input:focus{border-color:var(--gold);}
  .btn-rebuild{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:7px 14px;border-radius:3px;cursor:pointer;background:rgba(245,200,66,0.12);color:var(--gold);border:1px solid rgba(245,200,66,0.3);transition:all 0.15s;}
  .btn-rebuild:hover{background:rgba(245,200,66,0.2);}
  .team-inputs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:16px;}
  .team-row{display:flex;align-items:center;gap:8px;}
  .team-idx{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text-dim);min-width:20px;text-align:center;}
  .team-input{flex:1;background:var(--bg3);border:1px solid var(--border-bright);border-radius:3px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:16px;padding:7px 10px;outline:none;transition:border-color 0.15s;}
  .team-input:focus{border-color:var(--gold);}
  .danger-zone{display:flex;gap:10px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border);}
  .btn-danger{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,69,69,0.5);background:none;border:1px solid rgba(255,69,69,0.2);border-radius:3px;padding:6px 16px;cursor:pointer;transition:all 0.15s;}
  .btn-danger:hover{color:var(--red);border-color:var(--red);background:rgba(255,69,69,0.05);}

  /* FINALS SECTION */
  .finals-section{margin-top:8px;}
  .finals-note{font-size:16px;color:#B0B0C0;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;margin-bottom:14px;padding:8px 12px;background:rgba(245,200,66,0.04);border:1px solid rgba(245,200,66,0.1);border-radius:3px;}

  .loading{display:flex;align-items:center;justify-content:center;padding:80px;font-family:'Barlow Condensed',sans-serif;font-size:17px;letter-spacing:0.15em;text-transform:uppercase;color:#B0B0C0;gap:10px;}
  .spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border-bright);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:17px;letter-spacing:0.08em;padding:10px 20px;border-radius:4px;transition:transform 0.3s ease;z-index:1000;white-space:nowrap;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  @media(max-width:640px){.cat-grid{grid-template-columns:1fr 1fr;}.container{padding:0 12px 40px;}.import-actions{flex-direction:column;align-items:stretch;}.standings-head,.standings-row{grid-template-columns:24px 1fr 30px 30px 30px 38px 44px;padding:6px 8px;}}
</style>
</head>
<body>
<header class="site-header">
  <div><div class="logo-text">DBay Drift</div><div class="logo-sub">Pickleball 2026</div></div>
  <div class="admin-badge">Admin</div>
  <div class="header-right">
    <span id="conn-status" class="offline">Connecting…</span>
    <a href="players.html" class="player-link">Player View →</a>
  </div>
</header>
<div id="root"></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0gzqqJww11khc0xcq5dguzbFZ7B12VR8",
  authDomain: "fastfurious-dbaydrift.firebaseapp.com",
  databaseURL: "https://fastfurious-dbaydrift-default-rtdb.firebaseio.com",
  projectId: "fastfurious-dbaydrift",
  storageBucket: "fastfurious-dbaydrift.firebasestorage.app",
  messagingSenderId: "488263250252",
  appId: "1:488263250252:web:f661c24a591d85b4505fe9"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── SHEET CONFIG ──────────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqh2Xvn6diYE3dKhKpLv8led0QWyfHlWTQYTPn2mr_wnNAzVErLS_jIwaSJwlNrFTzAdTz0BjdiRmB/pub?gid=0&single=true&output=csv';
const SHEET_COL_MAP = [
  { header:'Mens up to 35 Low Intermediate',  id:'mens-35-below'   },
  { header:'Womens 35 High Intermediate',      id:'womens-35-plus'  },
  { header:'Womens up to 35 Low Intermediate', id:'womens-35-below' },
  { header:'Mens 35 High Intermediate',        id:'mens-35-plus'    },
  { header:'Mixed up to 35 Low Intermediate',  id:'mixed-35-below'  },
  { header:'Mixed 35 High Intermediate',       id:'mixed-35-plus'   },
  { header:'Allin Beginners',                  id:'all-beginners'   },
  { header:'Allin Advanced 40 min',            id:'all-advanced'    },
  { header:'Allin 50 No rating',               id:'seniors-50plus'  },
  { header:'Junior Scramble',                  id:'juniors'         },
];

const CATEGORIES = [
  { id:'mens-35-below',   name:"Men's 3.5 & Below",   sub:"Low Intermediate",   type:"MEN",    accent:'#3CEFFF' },
  { id:'mens-35-plus',    name:"Men's 3.5+",           sub:"High Intermediate",  type:"MEN",    accent:'#3CEFFF' },
  { id:'womens-35-below', name:"Women's 3.5 & Below",  sub:"Low Intermediate",   type:"WOMEN",  accent:'#FF3CAC' },
  { id:'womens-35-plus',  name:"Women's 3.5+",         sub:"High Intermediate",  type:"WOMEN",  accent:'#FF3CAC' },
  { id:'mixed-35-below',  name:"Mixed 3.5 & Below",    sub:"Low Intermediate",   type:"MIXED",  accent:'#39FF6A' },
  { id:'mixed-35-plus',   name:"Mixed 3.5+",           sub:"High Intermediate",  type:"MIXED",  accent:'#39FF6A' },
  { id:'all-beginners',   name:"All-In Beginners",      sub:"Open / No rating",   type:"ALL-IN", accent:'#F5C842' },
  { id:'all-advanced',    name:"All-In Advanced",       sub:"4.0+ rating",        type:"ALL-IN", accent:'#F5C842' },
  { id:'seniors-50plus',  name:"50+ Seniors",           sub:"No rating required", type:"50+",    accent:'#C084FC' },
  { id:'juniors',         name:"Junior Scramble",       sub:"Youth division",     type:"JUNIOR", accent:'#FB923C' },
];

// ── ROUND ROBIN ENGINE ────────────────────────────────────────────────────────
// Determine pool structure given n teams
function poolStructure(n) {
  if (n <= 1)  return [n];
  if (n <= 6)  return splitPools(n, 1);   // 1 pool
  if (n <= 10) return splitPools(n, 2);   // 2 pools
  return splitPools(n, 3);                // 3 pools for 11+
}

function splitPools(n, numPools) {
  const base = Math.floor(n / numPools);
  const extra = n % numPools;
  return Array.from({length: numPools}, (_, i) => base + (i < extra ? 1 : 0));
}

// Generate round-robin matches for n teams (0-indexed team slots)
// Returns array of {a, b} pairs
function roundRobinMatches(n) {
  const matches = [];
  for (let i = 0; i < n - 1; i++)
    for (let j = i + 1; j < n; j++)
      matches.push({a: i, b: j});
  return matches;
}

// Build a full category data structure from a list of team names
function buildCategory(teams, numPoolsOverride) {
  const activeTeams = teams.filter(t => t && t !== 'TBD');
  const n = activeTeams.length;
  if (n < 2) {
    return { teams, pools: [], finals: { sf1: null, sf2: null, final: null }, advancersPerPool: 0 };
  }

  // Use override if provided and valid, else auto-calculate
  const requestedPools = numPoolsOverride && numPoolsOverride >= 1 ? Math.min(numPoolsOverride, n) : null;
  const sizes = requestedPools ? splitPools(n, requestedPools) : poolStructure(n);
  const numPools = sizes.length;

  // Assign teams to pools
  let idx = 0;
  const pools = sizes.map((size, pi) => {
    const poolTeams = activeTeams.slice(idx, idx + size);
    idx += size;
    // Generate round-robin match list for this pool (store as global team indices)
    const baseIdx = activeTeams.indexOf(poolTeams[0]);
    const matches = roundRobinMatches(size).map((m, mi) => ({
      id: `p${pi}-m${mi}`,
      pool: pi,
      a: poolTeams[m.a],    // team name
      b: poolTeams[m.b],
      sA: '', sB: '', status: 'pending'
    }));
    return { poolIdx: pi, teamNames: poolTeams, matches };
  });

  // How many advance from each pool?
  // We need exactly 4 teams total for SF (2 per pool for ≤2 pools, 1 per pool for 3-4 pools + top wildcard)
  let advancersPerPool = numPools <= 2 ? 2 : 1;
  // Special: 3 pools → need 4 advancers: top 1 from each + best 2nd-placed (handled via wildcard logic)
  // For simplicity, always advance enough to fill 4 SF spots
  const totalAdvancers = numPools <= 2 ? numPools * 2 : 4;

  return {
    teams,
    pools,
    numPoolsOverride: numPoolsOverride || null,
    advancersPerPool,
    totalAdvancers,
    finals: {
      sf1: { id:'sf1', label:'Semi-final 1', a: null, b: null, sA:'', sB:'', status:'pending' },
      sf2: { id:'sf2', label:'Semi-final 2', a: null, b: null, sA:'', sB:'', status:'pending' },
      final: { id:'final', label:'Final',       a: null, b: null, sA:'', sB:'', status:'pending' },
    }
  };
}

// Compute pool standings from pool match results
function poolStandings(pool, allTeams) {
  const stats = {};
  pool.teamNames.forEach(name => {
    stats[name] = { name, w:0, d:0, l:0, pf:0, pa:0, pts:0, played:0 };
  });
  pool.matches.forEach(m => {
    const res = matchResult(m);
    if (!res) return;
    if (!stats[m.a] || !stats[m.b]) return;
    stats[m.a].played++; stats[m.b].played++;
    stats[m.a].pf += res.sA; stats[m.a].pa += res.sB;
    stats[m.b].pf += res.sB; stats[m.b].pa += res.sA;
    if (res.sA > res.sB) { stats[m.a].w++; stats[m.a].pts+=3; stats[m.b].l++; }
    else if (res.sB > res.sA) { stats[m.b].w++; stats[m.b].pts+=3; stats[m.a].l++; }
    else { stats[m.a].d++; stats[m.a].pts+=1; stats[m.b].d++; stats[m.b].pts+=1; }
  });
  return Object.values(stats).sort((a,b) =>
    b.pts - a.pts || (b.pf-b.pa) - (a.pf-a.pa) || b.pf - a.pf
  );
}

function matchResult(m) {
  if (m.sA === '' || m.sB === '' || m.sA === null || m.sB === null) return null;
  const sA = parseInt(m.sA), sB = parseInt(m.sB);
  if (isNaN(sA) || isNaN(sB)) return null;
  return { sA, sB };
}

// After pool play, seed the finals from standings
function seedFinals(catData) {
  if (!catData.pools || catData.pools.length === 0) return catData;
  const np = catData.pools.length;

  // Get top N from each pool
  const poolTops = catData.pools.map(pool => poolStandings(pool, catData.teams));

  let sf1A = null, sf1B = null, sf2A = null, sf2B = null;

  if (np === 1) {
    // 1 pool: 1st vs 4th, 2nd vs 3rd  (if enough teams, otherwise 1st vs 3rd, 2nd vs 4th)
    const st = poolTops[0];
    sf1A = st[0]?.name || null;
    sf1B = st[3]?.name || null;
    sf2A = st[1]?.name || null;
    sf2B = st[2]?.name || null;
  } else if (np === 2) {
    // 2 pools: A1 vs B2, B1 vs A2
    sf1A = poolTops[0][0]?.name || null;
    sf1B = poolTops[1][1]?.name || null;
    sf2A = poolTops[1][0]?.name || null;
    sf2B = poolTops[0][1]?.name || null;
  } else {
    // 3-4 pools: pool winners + best runner-up fill 4 SF spots
    // Collect all 1sts, then sort runner-ups for wildcard
    const winners = poolTops.map(st => st[0]?.name || null);
    const runnerUps = poolTops.map(st => st[1]).filter(Boolean)
      .sort((a,b) => b.pts-a.pts || (b.pf-b.pa)-(a.pf-a.pa) || b.pf-a.pf);
    const semis = [winners[0], winners[1], winners[2] || runnerUps[0]?.name, winners[3] || runnerUps[1]?.name].filter(Boolean);
    sf1A = semis[0] || null; sf1B = semis[3] || null;
    sf2A = semis[1] || null; sf2B = semis[2] || null;
  }

  catData.finals.sf1 = { ...catData.finals.sf1, a: sf1A, b: sf1B };
  catData.finals.sf2 = { ...catData.finals.sf2, a: sf2A, b: sf2B };
  return catData;
}

function seedFinal(catData) {
  const sf1res = matchResult(catData.finals.sf1);
  const sf2res = matchResult(catData.finals.sf2);
  const sf1win = sf1res ? (sf1res.sA > sf1res.sB ? catData.finals.sf1.a : catData.finals.sf1.b) : null;
  const sf2win = sf2res ? (sf2res.sA > sf2res.sB ? catData.finals.sf2.a : catData.finals.sf2.b) : null;
  catData.finals.final = { ...catData.finals.final, a: sf1win, b: sf2win };
  return catData;
}

// ── FIREBASE HELPERS ──────────────────────────────────────────────────────────
function fixCatData(d) {
  if (!d) return null;
  // Firebase turns arrays into objects — fix pools and their matches
  if (d.pools && !Array.isArray(d.pools)) d.pools = Object.values(d.pools);
  if (d.pools) {
    d.pools = d.pools.map(pool => {
      if (pool.matches && !Array.isArray(pool.matches)) pool.matches = Object.values(pool.matches);
      if (pool.teamNames && !Array.isArray(pool.teamNames)) pool.teamNames = Object.values(pool.teamNames);
      return pool;
    });
  }
  if (d.teams && !Array.isArray(d.teams)) d.teams = Object.values(d.teams);
  return d;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = { view:'home', catId:null, catData:{}, loading:true };

async function init() {
  onValue(ref(db, '.info/connected'), snap => {
    const el = document.getElementById('conn-status');
    if (el) { el.textContent = snap.val() ? 'Online' : 'Offline'; el.className = snap.val() ? 'online' : 'offline'; }
  });
  const snap = await get(ref(db, 'cats'));
  const existing = snap.exists() ? snap.val() : {};
  for (const cat of CATEGORIES) {
    state.catData[cat.id] = fixCatData(existing[cat.id]) || { teams:[], pools:[], finals:{sf1:null,sf2:null,final:null} };
  }
  onValue(ref(db, 'cats'), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    for (const catId of Object.keys(data)) {
      state.catData[catId] = fixCatData(data[catId]);
    }
    if (!state.loading) render();
  });
  state.loading = false;
  render();
}

async function saveCat(catId) {
  await set(ref(db, 'cats/' + catId), state.catData[catId]);
}
async function saveAll() {
  await set(ref(db, 'cats'), state.catData);
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function norm(s) { return s.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim(); }

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  function parseLine(line) {
    const fields=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}else cur+=ch;}
    fields.push(cur.trim()); return fields;
  }
  return lines.map(parseLine);
}

async function fetchSheetTeams() {
  const res = await fetch(SHEET_CSV_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const rows = parseCSV(await res.text());
  if (!rows.length) throw new Error('Empty sheet');
  const headers = rows[0];
  const colMap = {};
  headers.forEach((h, i) => {
    const m = SHEET_COL_MAP.find(m => norm(m.header) === norm(h));
    if (m) colMap[i] = m.id;
  });
  const result = {};
  for (let r = 1; r < rows.length; r++) {
    rows[r].forEach((cell, i) => {
      const catId = colMap[i]; if (!catId) return;
      const val = cell.trim(); if (!val) return;
      if (!result[catId]) result[catId] = [];
      result[catId].push(val);
    });
  }
  return result;
}

async function doImport() {
  setStatus('loading','Fetching spreadsheet…'); setBtns(true);
  try {
    const sheetTeams = await fetchSheetTeams();
    let totalT=0, catsU=0;
    for (const cat of CATEGORIES) {
      const teams = sheetTeams[cat.id];
      if (!teams || !teams.length) continue;
      // Rebuild the category with new teams, preserving any existing scores if team names match
      const existing = state.catData[cat.id];
      const newCat = buildCategory(teams, existing && existing.numPoolsOverride ? existing.numPoolsOverride : null);
      // Try to restore scores for matches where both team names are the same
      if (existing && existing.pools) restoreScores(newCat, existing);
      state.catData[cat.id] = newCat;
      totalT += teams.length; catsU++;
    }
    await saveAll();
    setStatus('success', `✓ Imported ${totalT} teams across ${catsU} categories`);
    toast('Teams imported ✓'); render();
  } catch(e) {
    console.error(e);
    setStatus('error', `Could not load spreadsheet: ${e.message}`);
  } finally { setBtns(false); }
}

function restoreScores(newCat, oldCat) {
  // Build a lookup of old match scores by team pair
  const scoreMap = {};
  if (oldCat.pools) oldCat.pools.forEach(pool => {
    (pool.matches||[]).forEach(m => {
      if (m.sA !== '' && m.sB !== '') {
        const key = [m.a,m.b].sort().join('||');
        scoreMap[key] = { sA: m.sA, sB: m.sB, status: m.status };
      }
    });
  });
  newCat.pools.forEach(pool => {
    pool.matches.forEach(m => {
      const key = [m.a,m.b].sort().join('||');
      if (scoreMap[key]) { m.sA = scoreMap[key].sA; m.sB = scoreMap[key].sB; m.status = scoreMap[key].status; }
    });
  });
}

async function doResetTeams() {
  if (!confirm('Reset ALL team names and draws across ALL categories? Scores will be cleared.')) return;
  for (const cat of CATEGORIES) state.catData[cat.id] = { teams:[], pools:[], finals:{sf1:null,sf2:null,final:null} };
  await saveAll();
  toast('All categories reset'); setStatus('',''); render();
}

function setStatus(type, msg) {
  const el = document.getElementById('import-status'); if (!el) return;
  el.className = 'import-status' + (type ? ' '+type : '');
  el.innerHTML = type==='loading' ? `<div class="spin-sm"></div><span>${msg}</span>` : msg;
}
function setBtns(dis) {
  ['btn-import','btn-refresh','btn-reset-teams'].forEach(id => { const el=document.getElementById(id); if(el) el.disabled=dis; });
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (state.loading) { root.innerHTML=`<div class="loading"><div class="spin"></div> Loading…</div>`; return; }
  root.innerHTML = state.view==='home' ? renderHome() : renderCat(state.catId);
  attach();
}

function catTeamCount(id) {
  const d = state.catData[id];
  return d && d.teams ? d.teams.filter(t=>t&&t!=='TBD').length : 0;
}
function catHasScores(id) {
  const d = state.catData[id];
  if (!d || !d.pools) return false;
  return d.pools.some(p => p.matches && p.matches.some(m => m.sA !== ''));
}

function renderHome() {

  return `
    <div class="hero">
      <div class="event-tag">Admin Panel · Fast &amp; Furious DBay Drift</div>
      <div class="hero-title">Tournament<br>Control</div>
      <div class="hero-sub">2026</div>
      <div class="hero-meta">Saturday 16 May &nbsp;·&nbsp; <span>Moreton City Pickleball</span></div>
    </div>
    <div class="container">
      <div class="section-label">Categories — ${CATEGORIES.length} Divisions</div>
      <div class="cat-grid">
        ${CATEGORIES.map((cat,i) => {
          const tc = catTeamCount(cat.id);
          return `
            <div class="cat-card" data-goto="${cat.id}" style="--accent:${cat.accent}">
              <div class="cat-card-top">
                <span class="cat-pill">${cat.type}</span>
                <span class="cat-num">${String(i+1).padStart(2,'0')}</span>
              </div>
              <div class="cat-name">${cat.name}</div>
              <div class="cat-desc">${cat.sub}</div>
              <div class="cat-team-count ${tc>0?'has-teams':''}">${tc>0?`${tc} teams entered`:'No teams loaded'}</div>
              <div class="cat-status">
                <div class="status-dot ${catHasScores(cat.id)?'active':''}"></div>
                ${catHasScores(cat.id)?'In progress':'Not started'}
              </div>
            </div>`;
        }).join('')}
      </div>

      <div class="section-label">Spreadsheet Import</div>
      <div class="import-panel">
        <div class="import-title">Google Sheets · Event List</div>
        <div class="import-desc">
          Pulls team names from the registration spreadsheet. Automatically builds round-robin pools and finals draw.
          Re-import anytime to pick up new registrations — existing scores are preserved where team names match.
          ${totalTeams>0?`<strong style="color:var(--gold)">${totalTeams} teams currently loaded.</strong>`:''}
        </div>
        <div class="import-actions">
          <button class="btn-import primary" id="btn-import">↓ Import Teams</button>

}

function renderCat(catId) {
  const cat = CATEGORIES.find(c=>c.id===catId);
  const d = state.catData[catId];
  const accent = cat.accent;
  const teams = (d && d.teams) ? d.teams.filter(t=>t&&t!=='TBD') : [];
  const hasPools = d && d.pools && d.pools.length > 0;

  // Seed finals from current standings before rendering
  if (hasPools) {
    seedFinals(d);
    seedFinal(d);
  }

  return `
    <div class="container" style="padding-top:24px;">
      <button class="back-btn" id="back-btn">← All Categories</button>
      <div class="bracket-header">
        <div class="bracket-accent" style="background:${accent}"></div>
        <div>
          <div class="bracket-title">${cat.name}</div>
          <div class="bracket-meta-row">
            <span style="color:${accent}">${cat.sub}</span>
            <span style="color:var(--border-bright)">|</span>
            <span>${teams.length} teams</span>
            ${hasPools ? `<span style="color:var(--border-bright)">|</span><span>${d.pools.length} pool${d.pools.length>1?'s':''} · Semi-finals · Final</span>` : ''}
          </div>
        </div>
      </div>

      ${hasPools ? renderPools(d, catId, accent) : ''}

      ${hasPools ? renderFinals(d, catId, accent) : ''}

      ${renderTeamEditor(d, catId, accent)}
    </div>`;
}

function renderPools(d, catId, accent) {
  const poolLetters = ['A','B','C','D'];
  return d.pools.map((pool, pi) => {
    const standings = poolStandings(pool, d.teams);
    const advCount = d.advancersPerPool || 2;
    const totalPoolMatches = pool.matches.length;
    const playedMatches = pool.matches.filter(m => matchResult(m)).length;

    return `
      <div class="pool-section">
        <div class="pool-header">
          <div class="pool-label" style="color:${accent}">Pool ${poolLetters[pi]}</div>
          <div class="pool-badge">${pool.teamNames.length} teams · ${playedMatches}/${totalPoolMatches} played</div>
        </div>

        <div class="section-label" style="margin-bottom:10px;">Matches</div>
        <div class="matches-grid">
          ${pool.matches.map(m => renderMatch(m, catId, accent, `Pool ${poolLetters[pi]}`)).join('')}
        </div>

        <div class="section-label" style="margin-bottom:10px;">Standings</div>
        ${renderStandings(standings, advCount, d.pools.length)}
      </div>`;
  }).join('');
}

function renderStandings(standings, advCount, numPools) {
  return `
    <div class="standings">
      <div class="standings-head">
        <div class="sh">#</div><div class="sh" style="text-align:left">Team</div>
        <div class="sh">P</div><div class="sh">W</div><div class="sh">L</div>
        <div class="sh">+/−</div><div class="sh">Pts</div>
      </div>
      ${standings.map((row, i) => {
        const diff = row.pf - row.pa;
        const advances = i < advCount;
        const isTbd = !row.name || row.name === 'TBD';
        return `
          <div class="standings-row ${advances?'advances':''}">
            <div class="sr-rank">${i+1}</div>
            <div class="sr-name ${isTbd?'tbd':''}">
              ${isTbd ? 'TBD' : row.name}
              ${advances ? '<span class="advances-tag">Advances</span>' : ''}
            </div>
            <div class="sr-cell">${row.played}</div>
            <div class="sr-cell">${row.w}</div>
            <div class="sr-cell">${row.l}</div>
            <div class="sr-cell" style="color:${diff>0?'var(--neon-green)':diff<0?'rgba(255,80,80,0.7)':'var(--text-dim)'}">${diff>0?'+':''}${diff}</div>
            <div class="sr-pts ${row.pts>0?'has-pts':''}">${row.pts}</div>
          </div>`;
      }).join('')}
    </div>`;
}

function renderFinals(d, catId, accent) {
  const sf1 = d.finals.sf1;
  const sf2 = d.finals.sf2;
  const fin = d.finals.final;
  const allPoolsDone = d.pools.every(p => p.matches.every(m => matchResult(m)));

  return `
    <div class="finals-section">
      <div class="section-label">Finals</div>
      ${!allPoolsDone ? `<div class="finals-note">Semi-final seedings will be confirmed once all pool matches are complete. Teams shown are current projections based on standings so far.</div>` : ''}
      <div class="matches-grid">
        ${sf1 ? renderFinalMatch(sf1, catId, accent) : ''}
        ${sf2 ? renderFinalMatch(sf2, catId, accent) : ''}
        ${fin ? renderFinalMatch(fin, catId, accent) : ''}
      </div>
    </div>`;
}

function renderMatch(m, catId, accent, poolLabel) {
  const res = matchResult(m);
  const played = res !== null;
  const aWins = played && res.sA > res.sB;
  const bWins = played && res.sB > res.sA;
  return `
    <div class="match-card ${played?'has-scores':''}">
      <div class="match-meta">
        <span>${poolLabel} · ${m.a} vs ${m.b.split(' ')[0]}…</span>
        ${played?'<span class="done-tag">Done</span>':''}
      </div>
      <div class="match-team">
        <span class="team-name-cell ${played?(aWins?'winner':''):''}">${m.a||'TBD'}</span>
        ${played
          ? `<span class="score-num ${aWins?'win':'lose'}">${m.sA}</span>`
          : `<input class="score-input" type="number" min="0" max="99" placeholder="–" value="${m.sA}"
              data-matchtype="pool" data-poolmatch="${m.id}" data-side="A" data-catid="${catId}" style="--accent-local:${accent}">`}
      </div>
      <div class="match-team">
        <span class="team-name-cell ${played?(bWins?'winner':''):''}">${m.b||'TBD'}</span>
        ${played
          ? `<span class="score-num ${bWins?'win':'lose'}">${m.sB}</span>`
          : `<input class="score-input" type="number" min="0" max="99" placeholder="–" value="${m.sB}"
              data-matchtype="pool" data-poolmatch="${m.id}" data-side="B" data-catid="${catId}" style="--accent-local:${accent}">`}
      </div>
      <div class="winner-bar ${played?'show':''}" style="background:${played?accent:'transparent'}"></div>
    </div>`;
}

function renderFinalMatch(m, catId, accent) {
  const res = matchResult(m);
  const played = res !== null;
  const aWins = played && res.sA > res.sB;
  const bWins = played && res.sB > res.sA;
  const nameA = m.a || null;
  const nameB = m.b || null;
  const isGold = m.id === 'final';
  return `
    <div class="match-card finals-card ${played?'has-scores':''}">
      <div class="match-meta">
        <span style="color:${isGold?'var(--gold)':'var(--text-muted)'}">${m.label}</span>
        ${played?'<span class="done-tag">Done</span>':''}
      </div>
      <div class="match-team">
        <span class="team-name-cell ${!nameA?'tbd':played?(aWins?'winner':''):''}">${nameA||'TBD — pending pool results'}</span>
        ${played
          ? `<span class="score-num ${aWins?'win':'lose'}">${m.sA}</span>`
          : `<input class="score-input" type="number" min="0" max="99" placeholder="–" value="${m.sA||''}"
              data-matchtype="final" data-finalid="${m.id}" data-side="A" data-catid="${catId}"
              ${!nameA||!nameB?'disabled':''} style="--accent-local:${isGold?'var(--gold)':accent}">`}
      </div>
      <div class="match-team">
        <span class="team-name-cell ${!nameB?'tbd':played?(bWins?'winner':''):''}">${nameB||'TBD — pending pool results'}</span>
        ${played
          ? `<span class="score-num ${bWins?'win':'lose'}">${m.sB}</span>`
          : `<input class="score-input" type="number" min="0" max="99" placeholder="–" value="${m.sB||''}"
              data-matchtype="final" data-finalid="${m.id}" data-side="B" data-catid="${catId}"
              ${!nameA||!nameB?'disabled':''} style="--accent-local:${isGold?'var(--gold)':accent}">`}
      </div>
      <div class="winner-bar ${played?'show':''}" style="background:${played?(isGold?'var(--gold)':accent):'transparent'}"></div>
    </div>`;
}

function renderTeamEditor(d, catId, accent) {
  const teams = (d && d.teams) ? d.teams : [];
  const count = teams.filter(t=>t&&t!=='TBD').length;
  const currentPools = (d && d.pools) ? d.pools.length : null;
  const overrideVal = d && d.numPoolsOverride ? d.numPoolsOverride : (currentPools || '');
  const autoLabel = count >= 2 ? `auto (${poolStructure(count).length})` : 'auto';

  // Build pool count options: auto + 1 through min(count, 4)
  const maxPools = Math.min(Math.max(count, 2), 4);
  const poolOpts = `<option value="">Auto — ${autoLabel}</option>` +
    Array.from({length: maxPools}, (_,i) => i+1)
      .map(n => `<option value="${n}" ${overrideVal==n?'selected':''}>${n} pool${n>1?'s':''}</option>`)
      .join('');

  return `
    <div class="team-editor-panel">
      <div class="section-label">Team Names &amp; Draw Setup</div>
      <div class="team-count-row">
        <div class="count-group">
          <span class="team-count-label">Teams:</span>
          <input class="team-count-input" type="number" min="2" max="16" value="${Math.max(count,2)}" id="team-count-inp">
        </div>
        <div class="count-divider"></div>
        <div class="count-group">
          <span class="team-count-label">Pools:</span>
          <select id="pool-count-sel" style="background:var(--bg3);border:1px solid var(--border-bright);border-radius:3px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;padding:6px 10px;outline:none;cursor:pointer;min-width:130px;">
            ${poolOpts}
          </select>
        </div>
        <button class="btn-rebuild" id="btn-rebuild-draw">↺ Rebuild Draw</button>
      </div>
      ${currentPools ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.04em;">
        Current draw: <strong style="color:var(--text)">${currentPools} pool${currentPools>1?'s':''}</strong> · 
        ${count} teams · Semi-finals · Final
      </p>` : ''}
      <div class="team-inputs-grid" id="team-inputs-grid">
        ${renderTeamInputs(teams, count, catId)}
      </div>
      <div class="danger-zone">
        <button class="btn-danger" id="reset-scores">Reset Scores Only</button>
        <button class="btn-danger" id="reset-cat">Reset Entire Category</button>
      </div>
    </div>`;
}

function renderTeamInputs(teams, count, catId) {
  const n = Math.max(count, 2);
  return Array.from({length: n}, (_, i) => {
    const val = (teams[i] && teams[i] !== 'TBD') ? teams[i] : '';
    return `
      <div class="team-row">
        <span class="team-idx">${i+1}</span>
        <input class="team-input team-name-input" type="text" value="${val}" placeholder="Team ${i+1}"
          data-teamidx="${i}" data-catid="${catId}">
      </div>`;
  }).join('');
}

// ── ATTACH ────────────────────────────────────────────────────────────────────
function attach() {
  document.querySelectorAll('[data-goto]').forEach(el =>
    el.addEventListener('click', () => { state.catId=el.dataset.goto; state.view='bracket'; render(); })
  );
  const back = document.getElementById('back-btn');
  if (back) back.addEventListener('click', () => { state.view='home'; render(); });

  // Import buttons
  const bi=document.getElementById('btn-import'), br=document.getElementById('btn-refresh'), brt=document.getElementById('btn-reset-teams');
  if(bi) bi.addEventListener('click', doImport);
  if(br) br.addEventListener('click', doImport);
  if(brt) brt.addEventListener('click', doResetTeams);

  // Pool match score inputs
  document.querySelectorAll('.score-input[data-matchtype="pool"]').forEach(inp => {
    inp.addEventListener('change', async () => {
      const catId=inp.dataset.catid, pmid=inp.dataset.poolmatch, side=inp.dataset.side;
      const d=state.catData[catId];
      let match=null;
      d.pools.forEach(p => { const m=p.matches.find(m=>m.id===pmid); if(m) match=m; });
      if(!match) return;
      if(side==='A') match.sA=inp.value.trim(); else match.sB=inp.value.trim();
      if(matchResult(match)) match.status='done';
      seedFinals(d); seedFinal(d);
      await saveCat(catId); toast('Score saved ✓'); render();
    });
  });

  // Final match score inputs
  document.querySelectorAll('.score-input[data-matchtype="final"]').forEach(inp => {
    inp.addEventListener('change', async () => {
      const catId=inp.dataset.catid, fid=inp.dataset.finalid, side=inp.dataset.side;
      const d=state.catData[catId];
      const m=d.finals[fid]; if(!m) return;
      if(side==='A') m.sA=inp.value.trim(); else m.sB=inp.value.trim();
      if(matchResult(m)) m.status='done';
      if(fid==='sf1'||fid==='sf2') seedFinal(d);
      await saveCat(catId); toast('Score saved ✓'); render();
    });
  });

  // Team count change → update inputs and refresh auto pool label
  const countInp = document.getElementById('team-count-inp');
  if (countInp) {
    countInp.addEventListener('change', () => {
      const catId=state.catId, d=state.catData[catId];
      const n=Math.min(16,Math.max(2,parseInt(countInp.value)||2));
      countInp.value=n;
      // Update the auto option label in pool selector
      const sel=document.getElementById('pool-count-sel');
      if(sel) {
        const autoOpt=sel.querySelector('option[value=""]');
        if(autoOpt) autoOpt.textContent=`Auto — auto (${poolStructure(n).length})`;
        // Remove pool options that exceed team count, add missing ones
        const max=Math.min(n,4);
        // Rebuild options
        const curVal=sel.value;
        sel.innerHTML=`<option value="">Auto — auto (${poolStructure(n).length})</option>`+
          Array.from({length:max},(_,i)=>i+1)
            .map(p=>`<option value="${p}" ${curVal==p&&p<=max?'selected':''}>${p} pool${p>1?'s':''}</option>`)
            .join('');
      }
      const grid=document.getElementById('team-inputs-grid');
      if(grid) grid.innerHTML=renderTeamInputs(d.teams||[], n, catId);
      reattachTeamInputs();
    });
  }

  // Rebuild draw button
  const rebuildBtn = document.getElementById('btn-rebuild-draw');
  if (rebuildBtn) rebuildBtn.addEventListener('click', async () => {
    const catId=state.catId, d=state.catData[catId];
    const n=Math.min(16,Math.max(2,parseInt(document.getElementById('team-count-inp')?.value)||2));
    const poolSelVal=document.getElementById('pool-count-sel')?.value;
    const numPoolsOverride=poolSelVal ? parseInt(poolSelVal) : null;
    // Collect current team names from inputs
    const names=[];
    document.querySelectorAll('.team-name-input').forEach((inp,i) => {
      if(i<n) names.push(inp.value.trim()||`Team ${i+1}`);
    });
    const newCat=buildCategory(names, numPoolsOverride);
    if(d.pools) restoreScores(newCat, d);
    state.catData[catId]=newCat;
    await saveCat(catId); toast('Draw rebuilt ✓'); render();
  });

  reattachTeamInputs();

  // Reset buttons
  const resetScores=document.getElementById('reset-scores');
  if(resetScores) resetScores.addEventListener('click', async () => {
    if(!confirm('Reset all scores for this category? Team names and draw will be kept.')) return;
    const d=state.catData[state.catId];
    d.pools.forEach(p=>p.matches.forEach(m=>{m.sA='';m.sB='';m.status='pending';}));
    d.finals={sf1:{...d.finals.sf1,sA:'',sB:'',status:'pending'},sf2:{...d.finals.sf2,sA:'',sB:'',status:'pending'},final:{...d.finals.final,sA:'',sB:'',status:'pending'}};
    await saveCat(state.catId); toast('Scores reset'); render();
  });

  const resetCat=document.getElementById('reset-cat');
  if(resetCat) resetCat.addEventListener('click', async () => {
    if(!confirm('Completely reset this category? All teams, draw, and scores will be cleared.')) return;
    state.catData[state.catId]={teams:[],pools:[],finals:{sf1:null,sf2:null,final:null}};
    await saveCat(state.catId); toast('Category reset'); render();
  });
}

function reattachTeamInputs() {
  document.querySelectorAll('.team-name-input').forEach(inp => {
    inp.addEventListener('blur', async () => {
      const catId=inp.dataset.catid, idx=parseInt(inp.dataset.teamidx);
      const val=inp.value.trim()||'TBD';
      if(!state.catData[catId].teams) state.catData[catId].teams=[];
      state.catData[catId].teams[idx]=val;
      await saveCat(catId); toast('Saved ✓');
    });
  });
}

render(); init();
</script>
</body>
</html>
